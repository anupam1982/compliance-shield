minimumSeverityToFail: high

bannedFileIndicators:
  - value: .pem
    severity: high
  - value: .pfx
    severity: high
  - value: .key
    severity: medium

bannedContentIndicators:
  - value: MD5
    severity: medium
  - value: DES
    severity: high
  - value: password=
    severity: high
  - value: api_key
    severity: high
  - value: secret
    severity: medium
  - value: TODO_SECRET
    severity: low

secretPatterns:
  - name: Demo AWS Pattern
    pattern: TEST_AWS_KEY_[A-Z0-9]+
    severity: critical

  - name: Demo Token Pattern
    pattern: TEST_TOKEN_[A-Za-z0-9]+
    severity: high

  - name: Demo JWT Pattern
    pattern: DEMO_JWT_[A-Za-z0-9._-]+
    severity: medium