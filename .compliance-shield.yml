scanMode: full-file

minimumSeverityToFail: high

bannedFileIndicators:
  - value: .pem
    severity: critical
  - value: .pfx
    severity: high
  - value: id_rsa
    severity: critical

bannedContentIndicators:
  - value: MD5
    severity: high
  - value: DES
    severity: critical
  - value: password=
    severity: critical
  - value: api_key
    severity: high

secretPatterns:
  - name: Demo AWS Pattern
    pattern: TEST_AWS_KEY_[A-Z0-9]+
    severity: critical

  - name: Demo Token Pattern
    pattern: TEST_TOKEN_[A-Za-z0-9]+
    severity: high

ignorePaths:
  - docs/
  - fixtures/

ignoreIndicators:
  - TODO_SECRET

inlineIgnoreComment: compliance-shield-ignore